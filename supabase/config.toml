# https://supabase.com/docs/guides/cli/config
# Sustituí YOUR_PROJECT_REF tras `supabase link` o a mano.

project_id = "YOUR_PROJECT_REF"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[functions.inventory-event-notify]
verify_jwt = false
